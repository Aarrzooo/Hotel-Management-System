{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Customer Login | The Perween Residency</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

<style>

body{
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:url("https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1800&q=80") center center/cover no-repeat;
    height:100vh;
}

.overlay{
    background:rgba(0,0,0,.55);
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-card{

    width:430px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(12px);
    border-radius:20px;
    padding:40px;
    color:white;
    box-shadow:0 10px 30px rgba(0,0,0,.5);

}

.logo{

    width:90px;
    height:90px;
    margin:auto;
    border-radius:50%;
    background:#D4AF37;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:35px;
    font-weight:bold;

}

.hotel-name{

    text-align:center;
    margin-top:15px;
    font-size:28px;
    font-weight:bold;
    color:#D4AF37;

}

.tagline{

    text-align:center;
    margin-bottom:30px;
    color:#f8f9fa;

}

.form-control{

    border-radius:10px;

}

.btn-login{

    background:#D4AF37;
    color:white;
    font-weight:bold;
    border:none;
    border-radius:10px;
    padding:12px;

}

.btn-login:hover{

    background:#b88b12;

}

.home-link{

    color:white;
    text-decoration:none;

}

.home-link:hover{

    color:#D4AF37;

}

</style>

</head>

<body>

<div class="overlay">

<div class="login-card">

<div class="logo">
PR
</div>

<div class="hotel-name">
The Perween Residency
</div>

<div class="tagline">
Luxury • Comfort • Hospitality
</div>

<form method="POST">

{% csrf_token %}

<div class="mb-3">

<label>Full Name</label>

<input
type="text"
name="name"
class="form-control"
placeholder="Enter Full Name"
required>

</div>

<div class="mb-3">

<label>Email Address</label>

<input
type="email"
name="email"
class="form-control"
placeholder="Enter Email"
required>

</div>

<div class="mb-3">

<label>Phone Number</label>

<input
type="text"
name="phone"
class="form-control"
placeholder="Enter Phone Number"
required>

</div>

<button class="btn btn-login w-100">

<i class="bi bi-box-arrow-in-right"></i>

Continue

</button>

</form>

<div class="text-center mt-4">

<a href="{% url 'home' %}" class="home-link">

<i class="bi bi-house-door-fill"></i>

Back to Home

</a>

</div>

</div>

</div>

</body>
</html>
